<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>股票收益记录</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root{
  --bg:#0b0f1a;--surface:#131929;--surface2:#1a2235;--border:#1f2d45;
  --accent:#00e5a0;--accent-dim:rgba(0,229,160,0.12);
  --warn:#f5c842;--warn-dim:rgba(245,200,66,0.12);
  --loss:#ff5c7a;--loss-dim:rgba(255,92,122,0.12);
  --text:#e8edf5;--text2:#7a8ba8;--text3:#3d5070;
  --mono:'DM Mono',monospace;--sans:'Noto Sans SC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh;padding-bottom:90px;}

/* ── Header ── */
.header{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.header-title{font-size:13px;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;}
.lang-switcher{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px;gap:2px;}
.lang-btn{background:none;border:none;color:var(--text3);font-size:11px;font-family:var(--sans);padding:4px 9px;border-radius:16px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.lang-btn.active{background:var(--accent);color:#000;font-weight:500;}

/* ── Tab bar ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin:0;}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── Summary cards ── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 14px 0;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
.sum-card.full{grid-column:1/-1;}
.sum-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.sum-amount{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1;}
.sum-amount.pos{color:var(--accent);}
.sum-amount.neg{color:var(--loss);}
.sum-amount.zero{color:var(--text2);}
.sum-sub{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:5px;}
.sum-sub.pos{color:var(--accent);}
.sum-sub.neg{color:var(--loss);}
.divider-label{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:20px 16px 8px;}

/* ── Stock cards ── */
.stock-list{padding:0 14px;display:flex;flex-direction:column;gap:10px;}
.stock-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.stock-card-header{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 14px 12px;cursor:pointer;}
.sc-left{}
.sc-code{font-family:var(--mono);font-size:14px;font-weight:500;}
.sc-name{font-size:11px;color:var(--text2);margin-top:2px;}
.sc-price-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
.sc-cur-price{font-family:var(--mono);font-size:13px;color:var(--text);}
.sc-price-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-family:var(--mono);}
.badge-auto{background:var(--accent-dim);color:var(--accent);}
.badge-manual{background:var(--warn-dim);color:var(--warn);}
.badge-none{background:var(--surface2);color:var(--text3);}
.sc-right{text-align:right;}
.sc-unrealized{font-family:var(--mono);font-size:15px;font-weight:500;}
.sc-unrealized.pos{color:var(--accent);}
.sc-unrealized.neg{color:var(--loss);}
.sc-unrealized.zero{color:var(--text2);}
.sc-rate{font-family:var(--mono);font-size:11px;margin-top:2px;}
.sc-rate.pos{color:var(--accent);}
.sc-rate.neg{color:var(--loss);}
.sc-realized-row{font-size:11px;color:var(--text3);margin-top:3px;}
.sc-realized-val{font-family:var(--mono);}
.sc-realized-val.pos{color:var(--accent);}
.sc-realized-val.neg{color:var(--loss);}

/* ── Price update row ── */
.price-update-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  background:var(--surface2);
  border-top:1px solid var(--border);
}
.price-input-wrap{flex:1;display:flex;align-items:center;gap:6px;}
.price-small-input{
  flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:8px 10px;color:var(--text);font-family:var(--mono);font-size:13px;
  outline:none;-webkit-appearance:none;
}
.price-small-input:focus{border-color:var(--accent);}
.btn-fetch{padding:8px 10px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-size:11px;cursor:pointer;white-space:nowrap;}
.btn-set-price{padding:8px 12px;background:var(--accent);border:none;border-radius:8px;color:#000;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;}
.fetch-status{font-size:10px;color:var(--text3);}

/* ── Expanded detail ── */
.stock-detail{border-top:1px solid var(--border);padding:12px 14px;}
.detail-section-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:10px 0 6px;}
.detail-section-title:first-child{margin-top:0;}

/* Unrealized trades */
.holding-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.holding-row:last-child{border-bottom:none;}
.hr-left{}
.hr-date{font-family:var(--mono);font-size:11px;color:var(--text2);}
.hr-detail{font-size:10px;color:var(--text3);margin-top:2px;}
.hr-right{text-align:right;}
.hr-profit{font-family:var(--mono);font-size:12px;}
.hr-profit.pos{color:var(--accent);}
.hr-profit.neg{color:var(--loss);}
.hr-rate{font-size:10px;color:var(--text3);}

/* Realized trades */
.realized-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.realized-row:last-child{border-bottom:none;}
.rr-profit{font-family:var(--mono);font-size:12px;}
.rr-profit.pos{color:var(--accent);}
.rr-profit.neg{color:var(--loss);}
.rr-rate{font-size:10px;color:var(--text3);}

/* ── Chart ── */
.chart-wrap{position:relative;height:200px;margin:8px 0 4px;}
canvas.price-chart{width:100%;height:100%;display:block;}
.chart-empty{height:120px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;}

/* ── Tools ── */
.tools-row{display:flex;gap:8px;padding:0 14px;margin:14px 0 0;}
.tool-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 4px;color:var(--text2);font-size:11px;cursor:pointer;text-align:center;}

/* ── FAB ── */
.fab{position:fixed;bottom:28px;right:18px;background:var(--accent);color:#000;border:none;border-radius:28px;padding:14px 20px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 24px rgba(0,229,160,.25);z-index:100;}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:24px 18px 40px;width:100%;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:500;margin-bottom:18px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--sans);font-size:15px;outline:none;-webkit-appearance:none;}
.form-input:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-hint{font-size:10px;color:var(--text3);margin-top:4px;}
.btn-row{display:flex;gap:10px;margin-top:18px;}
.btn-cancel{flex:1;padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:15px;cursor:pointer;}
.btn-save{flex:2;padding:13px;background:var(--accent);border:none;border-radius:12px;color:#000;font-size:15px;font-weight:500;cursor:pointer;}

/* ── Empty ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px;}
.empty-state div:first-child{font-size:32px;margin-bottom:12px;}
.del-btn{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:2px 6px;border-radius:6px;}
.del-btn:active{background:var(--loss-dim);color:var(--loss);}
.no-select{user-select:none;-webkit-user-select:none;}

/* ── Spinner ── */
.spin{display:inline-block;width:10px;height:10px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* page sections */
.page{display:none;}
.page.active{display:block;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title" id="app-title">股票收益记录</div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ja')">日本語</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('positions')" id="tab-positions">持仓</div>
  <div class="tab" onclick="showTab('realized')" id="tab-realized">已实现</div>
  <div class="tab" onclick="showTab('chart')" id="tab-chart">图表</div>
</div>

<!-- ══ TAB: Positions ══ -->
<div class="page active" id="page-positions">
  <div class="summary-grid">
    <div class="sum-card">
      <div class="sum-label" id="lbl-unrealized">持仓预想收益</div>
      <div class="sum-amount" id="sum-unrealized">¥ 0.00</div>
      <div class="sum-sub" id="sum-unrealized-rate">+0.00%</div>
    </div>
    <div class="sum-card">
      <div class="sum-label" id="lbl-market-val">当前市值</div>
      <div class="sum-amount zero" id="sum-market-val">¥ 0.00</div>
      <div class="sum-sub" id="sum-invested-label">投入: ¥ 0</div>
    </div>
  </div>
  <div class="divider-label" id="lbl-holdings">持有股票</div>
  <div class="stock-list" id="holdings-list"></div>
</div>

<!-- ══ TAB: Realized ══ -->
<div class="page" id="page-realized">
  <div class="summary-grid">
    <div class="sum-card full">
      <div class="sum-label" id="lbl-realized-total">已实现累计收益</div>
      <div class="sum-amount" id="sum-realized">¥ 0.00</div>
      <div class="sum-sub" id="sum-realized-rate">+0.00%</div>
    </div>
  </div>
  <div class="divider-label" id="lbl-realized-stocks">已平仓股票</div>
  <div class="stock-list" id="realized-list"></div>
</div>

<!-- ══ TAB: Chart ══ -->
<div class="page" id="page-chart">
  <div style="padding:14px 14px 0">
    <select class="form-input" id="chart-stock-select" onchange="renderChart()"></select>
  </div>
  <div style="padding:14px;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;">
      <div style="font-size:11px;color:var(--text3);margin-bottom:10px;" id="lbl-chart-title">股价走势</div>
      <div class="chart-wrap">
        <canvas id="price-chart"></canvas>
        <div class="chart-empty" id="chart-empty" style="display:none">暂无价格记录</div>
      </div>
      <div style="display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);">
          <div style="width:20px;height:2px;background:var(--accent)"></div><span id="legend-price">记录价格</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);">
          <div style="width:20px;height:2px;background:var(--warn);border-top:2px dashed var(--warn)"></div><span id="legend-buy">买入均价</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);">
          <div style="width:20px;height:2px;background:var(--loss)"></div><span id="legend-sell">实际卖出</span>
        </div>
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:10px;">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;" id="lbl-price-history">价格记录历史</div>
      <div id="price-history-list"></div>
    </div>
  </div>
</div>

<!-- Tools -->
<div class="tools-row">
  <button class="tool-btn" onclick="exportData()" id="btn-export">📤 导出</button>
  <button class="tool-btn" onclick="document.getElementById('import-file').click()" id="btn-import">📥 导入</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  <button class="tool-btn" onclick="clearAll()" id="btn-clear">🗑 清空</button>
</div>

<button class="fab" onclick="openModal()" id="fab-btn">＋ 添加交易</button>

<!-- ══ Modal ══ -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal no-select">
    <div class="modal-title" id="modal-title">录入交易</div>
    <div class="form-group">
      <label class="form-label" id="lbl-code-name">股票代码 / 名称</label>
      <div class="form-row">
        <div>
          <input class="form-input" id="f-code" inputmode="text" autocomplete="off">
          <div class="form-hint" id="hint-code">如: 600519.SS / AAPL / 7203.T</div>
        </div>
        <input class="form-input" id="f-name" autocomplete="off">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-date">交易日期</label>
      <input class="form-input" id="f-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-buy-info">买入信息</label>
      <div class="form-row">
        <div>
          <input class="form-input" id="f-buy-price" inputmode="decimal">
          <div class="form-hint" id="hint-buy-price">元 / 股</div>
        </div>
        <div>
          <input class="form-input" id="f-shares" inputmode="decimal">
          <div class="form-hint" id="hint-shares">股</div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-sell-price">卖出价格（留空 = 持有中）</label>
      <input class="form-input" id="f-sell-price" inputmode="decimal">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-fee">手续费（可选）</label>
      <input class="form-input" id="f-fee" inputmode="decimal">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-note">备注</label>
      <input class="form-input" id="f-note">
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()" id="btn-cancel">取消</button>
      <button class="btn-save" onclick="saveTrade()" id="btn-save">保存</button>
    </div>
  </div>
</div>

let lang = localStorage.getItem('stock_lang') || 'zh';
// trades: [{code,name,date,buyPrice,shares,sellPrice?,fee?,note?}]
let trades = JSON.parse(localStorage.getItem('stock_trades') || '[]');
// priceLog: {code: [{date,price,source:'auto'|'manual'}]}
let priceLog = JSON.parse(localStorage.getItem('stock_price_log') || '{}');
// currentPrices: {code: {price, source, updatedAt}}
let currentPrices = JSON.parse(localStorage.getItem('stock_current_prices') || '{}');

let currentTab = 'positions';
const expandedCards = new Set();

function t(k){ return I18N[lang][k] || k; }
function saveAll(){
  localStorage.setItem('stock_trades', JSON.stringify(trades));
  localStorage.setItem('stock_price_log', JSON.stringify(priceLog));
  localStorage.setItem('stock_current_prices', JSON.stringify(currentPrices));
}

// ── Format ──
function fmt(n, cur){
  cur = cur || t('currency');
  const abs = Math.abs(n).toLocaleString(t('locale'),{minimumFractionDigits:2,maximumFractionDigits:2});
  return (n>=0?'+':'-')+cur+' '+abs;
}
function fmtP(n, cur){
  cur = cur || t('currency');
  return cur+' '+Math.abs(n).toLocaleString(t('locale'),{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtRate(r){ return (r>=0?'+':'')+r.toFixed(2)+'%'; }
function cls(n){ return n>0?'pos':n<0?'neg':'zero'; }

// ── Groups ──
function getGroups(){
  const groups={};
  trades.forEach((tr,i)=>{
    const key = (tr.code||tr.name||'').toUpperCase().trim();
    if(!key) return;
    if(!groups[key]) groups[key]={code:tr.code,name:tr.name,key,holdings:[],closed:[]};
    const obj={...tr,_idx:i};
    // explicit null/undefined check — 0 or "" should not be treated as "sold"
    if(tr.sellPrice != null && tr.sellPrice !== '' && Number(tr.sellPrice) > 0){
      obj.sellPrice = Number(tr.sellPrice);
      groups[key].closed.push(obj);
    } else {
      obj.sellPrice = null;
      groups[key].holdings.push(obj);
    }
  });
  return groups;
}

// ── Tab ──
function showTab(tab){
  currentTab = tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='chart') renderChart();
}

// ══════════════════════════════════════════════
//  Auto price fetch  (Yahoo Finance via allorigins proxy)
// ══════════════════════════════════════════════
async function fetchPrice(ticker){
  // Yahoo Finance query1 endpoint via CORS proxy
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const resp = await fetch(proxy, {signal: AbortSignal.timeout(8000)});
  const json = await resp.json();
  const data = JSON.parse(json.contents);
  const result = data?.chart?.result?.[0];
  const meta = result?.meta;
  const price = meta?.regularMarketPrice || meta?.previousClose;
  if(!price) throw new Error('no price');
  return price;
}

async function autoFetchAndUpdate(key, inputId, statusId){
  const groups = getGroups();
  const g = groups[key];
  if(!g) return;
  const ticker = g.code;
  if(!ticker){ showStatus(statusId, t('fetchFail'), true); return; }
  showStatus(statusId, '<span class="spin"></span>', false);
  try{
    const price = await fetchPrice(ticker);
    document.getElementById(inputId).value = price.toFixed(2);
    setCurrentPrice(key, price, 'auto');
    showStatus(statusId, t('priceUpdated'), false);
  } catch(e){
    showStatus(statusId, t('fetchFail'), true);
  }
}

function showStatus(id, msg, isErr){
  const el = document.getElementById(id);
  if(!el) return;
  el.innerHTML = msg;
  el.style.color = isErr ? 'var(--loss)' : 'var(--accent)';
  if(!isErr && msg===t('priceUpdated')) setTimeout(()=>{ el.innerHTML=''; }, 2500);
}

function setCurrentPrice(key, price, source){
  currentPrices[key] = {price, source, updatedAt: new Date().toISOString()};
  // log it
  const today = new Date().toISOString().slice(0,10);
  if(!priceLog[key]) priceLog[key]=[];
  // avoid duplicate same-day entries (overwrite)
  const idx = priceLog[key].findIndex(p=>p.date===today);
  if(idx>=0) priceLog[key][idx] = {date:today,price,source};
  else priceLog[key].push({date:today,price,source});
  priceLog[key].sort((a,b)=>a.date.localeCompare(b.date));
  saveAll();
  renderAll();
}

function manualSetPrice(key, inputId){
  const val = parseFloat(document.getElementById(inputId).value);
  if(isNaN(val)||val<=0){ alert('请输入有效价格'); return; }
  setCurrentPrice(key, val, 'manual');
}

function renderPositions(){
  const groups = getGroups();
  let totalUnrealized=0, totalInvested=0, totalMarketVal=0;

  const holdingGroups = Object.values(groups).filter(g=>g.holdings.length>0);

  holdingGroups.forEach(g=>{
    const cp = currentPrices[g.key];
    g.holdings.forEach(tr=>{
      const cost = tr.buyPrice*tr.shares+(tr.fee||0);
      totalInvested += cost;
      if(cp){
        const mv = cp.price*tr.shares;
        totalMarketVal += mv;
        totalUnrealized += mv - cost;
      }
    });
  });

  const unrEl = document.getElementById('sum-unrealized');
  unrEl.textContent = fmt(totalUnrealized);
  unrEl.className = 'sum-amount '+(totalInvested>0?cls(totalUnrealized):'zero');
  const unrRate = totalInvested>0?(totalUnrealized/totalInvested*100):0;
  const unrRateEl = document.getElementById('sum-unrealized-rate');
  unrRateEl.textContent = fmtRate(unrRate);
  unrRateEl.className = 'sum-sub '+cls(unrRate);
  document.getElementById('sum-market-val').textContent = fmtP(totalMarketVal);
  document.getElementById('sum-invested-label').textContent = t('invested')+': '+fmtP(totalInvested);

  const list = document.getElementById('holdings-list');
  if(holdingGroups.length===0){
    list.innerHTML=`<div class="empty-state"><div>📈</div>${t('emptyHoldings')}</div>`;
    return;
  }
  list.innerHTML='';
  holdingGroups.forEach(g=>{
    const cp = currentPrices[g.key];
    let gUnrealized=0, gInvested=0, gMV=0;
    let avgBuy=0, totalShares=0;
    g.holdings.forEach(tr=>{
      const cost=tr.buyPrice*tr.shares+(tr.fee||0);
      gInvested+=cost;
      totalShares+=tr.shares;
      avgBuy+=tr.buyPrice*tr.shares;
      if(cp){ gMV+=cp.price*tr.shares; gUnrealized+=cp.price*tr.shares-cost; }
    });
    avgBuy = totalShares>0?avgBuy/totalShares:0;
    const gRate = gInvested>0?(gUnrealized/gInvested*100):0;

    // realized for this stock
    let gRealized=0;
    (g.closed||[]).forEach(tr=>{
      gRealized+=(tr.sellPrice-tr.buyPrice)*tr.shares-(tr.fee||0);
    });

    const badge = cp
      ? (cp.source==='auto'
          ?`<span class="sc-price-badge badge-auto">${t('badgeAuto')}</span>`
          :`<span class="sc-price-badge badge-manual">${t('badgeManual')}</span>`)
      : `<span class="sc-price-badge badge-none">${t('badgeNone')}</span>`;

    const priceText = cp ? fmtP(cp.price) : '—';
    const inputId = 'pi-'+g.key;
    const statusId = 'ps-'+g.key;
    const isOpen = expandedCards.has(g.key);

    const card = document.createElement('div');
    card.className='stock-card';
    card.innerHTML=`
      <div class="stock-card-header" onclick="toggleCard('${g.key}')">
        <div class="sc-left">
          <div class="sc-code">${g.code||'—'}</div>
          <div class="sc-name">${g.name||'—'}</div>
          <div class="sc-price-row">
            <span class="sc-cur-price">${priceText}</span>${badge}
          </div>
        </div>
        <div class="sc-right">
          <div class="sc-unrealized ${cp?cls(gUnrealized):'zero'}">${cp?fmt(gUnrealized):'—'}</div>
          <div class="sc-rate ${cp?cls(gRate):'zero'}">${cp?fmtRate(gRate):'—'}</div>
          ${gRealized!==0?`<div class="sc-realized-row">${t('realizedProfit')}: <span class="sc-realized-val ${cls(gRealized)}">${fmt(gRealized)}</span></div>`:''}
        </div>
      </div>
      <div class="price-update-row">
        <div class="price-input-wrap">
          <input class="price-small-input" id="${inputId}" inputmode="decimal" placeholder="${t('buyPricePh')}">
        </div>
        <button class="btn-fetch" onclick="autoFetchAndUpdate('${g.key}','${inputId}','${statusId}')">${t('fetchBtn')}</button>
        <button class="btn-set-price" onclick="manualSetPrice('${g.key}','${inputId}')">${t('setBtn')}</button>
      </div>
      <div class="fetch-status" style="padding:0 14px 6px;min-height:18px" id="${statusId}"></div>
      ${isOpen?renderHoldingDetail(g, cp, avgBuy):''}
    `;
    list.appendChild(card);
  });
}

function renderHoldingDetail(g, cp, avgBuy){
  const cur = t('currency');
  let html = `<div class="stock-detail">`;
  html += `<div class="detail-section-title">${t('holdingTrades')}</div>`;
  g.holdings.forEach(tr=>{
    const cost = tr.buyPrice*tr.shares+(tr.fee||0);
    const p = cp?(cp.price-tr.buyPrice)*tr.shares-(tr.fee||0):null;
    const r = p!==null&&cost>0?(p/cost*100):null;
    html+=`<div class="holding-row">
      <div class="hr-left">
        <div class="hr-date">${tr.date}</div>
        <div class="hr-detail">${t('buyWord')} ${cur}${tr.buyPrice} × ${tr.shares}${t('hintShares')}${tr.fee?` ｜${t('feeWord')} ${cur}${tr.fee}`:''}${tr.note?` ｜${tr.note}`:''}</div>

  const relEl = document.getElementById('sum-realized');
  relEl.textContent = fmt(totalRealized);

          <div class="sc-name">${g.name||'—'}</div>

function toggleCard(key){

let chartInstance = null;

function updateChartSelect(){
  const sel = document.getElementById('chart-stock-select');
  const groups = getGroups();
  const keys = Object.keys(groups);
  const prev = sel.value;
  sel.innerHTML = keys.map(k=>`<option value="${k}">${groups[k].code||groups[k].name} ${groups[k].name||''}</option>`).join('');
  if(keys.includes(prev)) sel.value=prev;
}

function renderChart(){
  const sel = document.getElementById('chart-stock-select');
  const key = sel.value;
  if(!key) return;

  const groups = getGroups();
  const g = groups[key];
  const log = (priceLog[key]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));

  const emptyEl = document.getElementById('chart-empty');
  const canvas = document.getElementById('price-chart');

  if(log.length===0){
    emptyEl.style.display='flex';
    canvas.style.display='none';
    document.getElementById('price-history-list').innerHTML=`<div style="color:var(--text3);font-size:12px">${t('noPrice')}</div>`;
    return;
  }
  emptyEl.style.display='none';
  canvas.style.display='block';

  // avg buy price
  let totalCost=0, totalShares=0;
  [...(g.holdings||[]),...(g.closed||[])].forEach(tr=>{
    totalCost+=tr.buyPrice*tr.shares; totalShares+=tr.shares;
  });
  const avgBuy = totalShares>0?totalCost/totalShares:null;

  // sell prices from closed trades
  const sellPoints = {};
  (g.closed||[]).forEach(tr=>{ sellPoints[tr.date]=(sellPoints[tr.date]||[]); sellPoints[tr.date].push(tr.sellPrice); });

  const labels = log.map(p=>p.date);
  const prices = log.map(p=>p.price);
  const avgLine = labels.map(()=>avgBuy);
  const sellLine = labels.map(l=>sellPoints[l]?sellPoints[l][0]:null);

  // destroy previous
  if(chartInstance){ chartInstance.destroy(); chartInstance=null; }

  const ctx = canvas.getContext('2d');
  // simple canvas chart
  drawChart(ctx, canvas, labels, prices, avgLine, sellLine, avgBuy);

  // History list
  renderPriceHistoryList(key);
}

function drawChart(ctx, canvas, labels, prices, avgLine, sellLine, avgBuy){
  const W = canvas.offsetWidth * devicePixelRatio;
  const H = canvas.offsetHeight * devicePixelRatio;
  canvas.width = W; canvas.height = H;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;

  const pad = {top:20, right:16, bottom:40, left:60};
  const cw = w-pad.left-pad.right, ch = h-pad.top-pad.bottom;

  const allVals = [...prices, ...avgLine.filter(Boolean), ...sellLine.filter(Boolean)];
  const minV = Math.min(...allVals)*0.98, maxV = Math.max(...allVals)*1.02;
  const range = maxV-minV||1;

  const xOf = i => pad.left + (i/(labels.length-1||1))*cw;
  const yOf = v => pad.top + (1-(v-minV)/range)*ch;

  ctx.clearRect(0,0,w,h);

  // grid
  ctx.strokeStyle='rgba(31,45,69,0.8)'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.top+i/4*ch;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke();
    const val=(maxV-i/4*range).toFixed(2);
    ctx.fillStyle='#3d5070'; ctx.font=`${10*devicePixelRatio/devicePixelRatio}px DM Mono,monospace`;
    ctx.textAlign='right'; ctx.fillText(val, pad.left-6, y+4);
  }

  // avg buy line (dashed yellow)
  if(avgBuy){
    const yA=yOf(avgBuy);
    ctx.strokeStyle='#f5c842'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(pad.left,yA); ctx.lineTo(pad.left+cw,yA); ctx.stroke();
    ctx.setLineDash([]);
  }

  // sell points line
  const sellPts = labels.map((l,i)=>sellLine[i]!=null?{x:xOf(i),y:yOf(sellLine[i]),v:sellLine[i]}:null).filter(Boolean);
  sellPts.forEach(p=>{
    ctx.fillStyle='#ff5c7a';
    ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill();
  });

  // price line
  ctx.strokeStyle='#00e5a0'; ctx.lineWidth=2; ctx.setLineDash([]);
  ctx.beginPath();
  prices.forEach((v,i)=>{ const x=xOf(i),y=yOf(v); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();

  // dots
  prices.forEach((v,i)=>{
    ctx.fillStyle='#00e5a0';
    ctx.beginPath(); ctx.arc(xOf(i),yOf(v),3.5,0,Math.PI*2); ctx.fill();
  });

  // x labels
  ctx.fillStyle='#3d5070'; ctx.textAlign='center'; ctx.font='9px DM Mono,monospace';
  const step = Math.max(1,Math.floor(labels.length/5));
  labels.forEach((l,i)=>{ if(i%step===0||i===labels.length-1) ctx.fillText(l.slice(5),xOf(i),h-pad.bottom+14); });
}

function renderPriceHistoryList(key){
  const log = (priceLog[key]||[]).slice().reverse();
  const el = document.getElementById('price-history-list');
  if(!log.length){ el.innerHTML=`<div style="color:var(--text3);font-size:12px">${t('noPrice')}</div>`; return; }
  el.innerHTML = log.map(p=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);">
      <div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text2)">${p.date}</div>
        <div style="font-size:10px;color:var(--text3)">${p.source==='auto'?t('badgeAuto'):t('badgeManual')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-family:var(--mono);font-size:13px">${t('currency')}${p.price.toFixed(2)}</div>
        <button class="del-btn" onclick="deletePriceLog('${key}','${p.date}')">×</button>
      </div>
    </div>
  `).join('');
}

function deletePriceLog(key, date){
  if(!confirm('删除该价格记录？')) return;
  priceLog[key] = (priceLog[key]||[]).filter(p=>p.date!==date);
  saveAll(); renderChart();
}

// ══════════════════════════════════════════════
//  Modal / Trades
// ══════════════════════════════════════════════
function openModal(){
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-date').valueAsDate=new Date();
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  ['f-code','f-name','f-buy-price','f-shares','f-sell-price','f-fee','f-note'].forEach(id=>{ document.getElementById(id).value=''; });
}
function handleOverlayClick(e){ if(e.target===document.getElementById('modal')) closeModal(); }

function saveTrade(){
  const code=document.getElementById('f-code').value.trim().toUpperCase();
  const name=document.getElementById('f-name').value.trim();
  const date=document.getElementById('f-date').value;
  const buyPrice=parseFloat(document.getElementById('f-buy-price').value);
  const shares=parseFloat(document.getElementById('f-shares').value);
  const sellPrice=parseFloat(document.getElementById('f-sell-price').value)||null;
  const fee=parseFloat(document.getElementById('f-fee').value)||0;
  const note=document.getElementById('f-note').value.trim();
  if((!code&&!name)||!date||isNaN(buyPrice)||isNaN(shares)){ alert(t('alertRequired')); return; }
  trades.push({code,name,date,buyPrice,shares,sellPrice,fee,note});
  saveAll(); renderAll(); closeModal();
}

function deleteTrade(idx, e){
  e.stopPropagation();
  if(!confirm(t('confirmDelete'))) return;
  trades.splice(idx,1); saveAll(); renderAll();
}

function exportData(){
  const blob=new Blob([JSON.stringify({trades,priceLog,currentPrices},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='stock_data_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      // support old format (array) and new format (object)
      if(Array.isArray(data)){
        if(confirm(`${data.length} ${t('confirmImport')}`)){trades=[...trades,...data];saveAll();renderAll();}
      } else if(data.trades){
        const msg=`${data.trades.length} ${t('confirmImport')}`;
        if(confirm(msg)){
          trades=[...trades,...(data.trades||[])];
          Object.entries(data.priceLog||{}).forEach(([k,v])=>{
            priceLog[k]=[...(priceLog[k]||[]),...v];
            priceLog[k].sort((a,b)=>a.date.localeCompare(b.date));
          });
          Object.assign(currentPrices, data.currentPrices||{});
          saveAll(); renderAll();
        }
      } else throw new Error();
    } catch{ alert(t('jsonError')); }
  };
  reader.readAsText(file); e.target.value='';
}
function clearAll(){
  if(confirm(t('confirmClear'))){ trades=[];priceLog={};currentPrices={};saveAll();renderAll(); }
}

function applyI18n(){
  const m={
    'app-title':'appTitle','lbl-unrealized':'unrealized','lbl-market-val':'marketVal',
    'lbl-holdings':'holdings','lbl-realized-total':'realizedTotal','lbl-realized-stocks':'realizedStocks',
    'lbl-chart-title':'chartTitle','lbl-price-history':'priceHistory',
    'tab-positions':'tabPositions','tab-realized':'tabRealized','tab-chart':'tabChart',
    'btn-export':'export','btn-import':'import','btn-clear':'clear','fab-btn':'fab',
    'modal-title':'modalTitle','lbl-code-name':'codeName','hint-code':'hintCode',
    'lbl-date':'date','lbl-buy-info':'buyInfo','hint-buy-price':'hintBuyPrice','hint-shares':'hintShares',
    'lbl-sell-price':'sellPrice','lbl-fee':'fee','lbl-note':'note',
    'btn-cancel':'cancel','btn-save':'save',
    'legend-price':'legendPrice','legend-buy':'legendBuy','legend-sell':'legendSell',
  };
  Object.entries(m).forEach(([id,key])=>{ const el=document.getElementById(id); if(el) el.textContent=t(key); });
  document.getElementById('f-code').placeholder=t('codePh');
  document.getElementById('f-name').placeholder=t('namePh');
  document.getElementById('f-buy-price').placeholder=t('buyPricePh');
  document.getElementById('f-shares').placeholder=t('sharesPh');
  document.getElementById('f-sell-price').placeholder=t('sellPricePh');
  document.getElementById('f-fee').placeholder=t('feePh');
  document.getElementById('f-note').placeholder=t('notePh');
  document.title=t('appTitle');
}

function setLang(l){
  lang=l; localStorage.setItem('stock_lang',l);
  document.documentElement.style.setProperty('--sans', l==='ja'?"'Noto Sans JP',sans-serif":"'Noto Sans SC',sans-serif");
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim()===(l==='zh'?'中文':l==='en'?'EN':'日本語'));
  });
  applyI18n(); renderAll();
}

// ── Init ──
setLang(lang);
renderAll();
</script>
