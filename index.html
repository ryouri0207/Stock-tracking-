<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>股票收益记录</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root{
  --bg:#0b0f1a;--surface:#131929;--surface2:#1a2235;--border:#1f2d45;
  --accent:#00e5a0;--accent-dim:rgba(0,229,160,0.12);
  --warn:#f5c842;--warn-dim:rgba(245,200,66,0.12);
  --loss:#ff5c7a;--loss-dim:rgba(255,92,122,0.12);
  --text:#e8edf5;--text2:#7a8ba8;--text3:#3d5070;
  --mono:'DM Mono',monospace;--sans:'Noto Sans SC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh;padding-bottom:90px;}

.header{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.header-title{font-size:13px;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;}
.lang-switcher{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px;gap:2px;}
.lang-btn{background:none;border:none;color:var(--text3);font-size:11px;font-family:var(--sans);padding:4px 9px;border-radius:16px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.lang-btn.active{background:var(--accent);color:#000;font-weight:500;}

.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* summary top card */
.top-sum{margin:14px 14px 0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
.top-sum-row{display:flex;gap:0;}
.top-sum-item{flex:1;padding:0 10px;}
.top-sum-item:first-child{padding-left:0;border-right:1px solid var(--border);}
.top-sum-item:last-child{padding-right:0;}
.tsi-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.tsi-val{font-family:var(--mono);font-size:20px;font-weight:500;}
.tsi-val.pos{color:var(--accent);}
.tsi-val.neg{color:var(--loss);}
.tsi-val.zero{color:var(--text2);}
.tsi-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px;}
.tsi-sub.pos{color:var(--accent);}
.tsi-sub.neg{color:var(--loss);}

.section-title{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:18px 16px 8px;}

/* stock cards */
.stock-list{padding:0 14px;display:flex;flex-direction:column;gap:12px;}
.stock-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}

/* card summary header */
.card-summary{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 14px 10px;cursor:pointer;}
.cs-left .cs-code{font-family:var(--mono);font-size:15px;font-weight:500;}
.cs-left .cs-name{font-size:11px;color:var(--text2);margin-top:2px;}
.cs-right{text-align:right;}
.cs-total{font-family:var(--mono);font-size:15px;font-weight:500;}
.cs-total.pos{color:var(--accent);}
.cs-total.neg{color:var(--loss);}
.cs-total.zero{color:var(--text2);}
.cs-rate{font-family:var(--mono);font-size:11px;margin-top:2px;}
.cs-rate.pos{color:var(--accent);}
.cs-rate.neg{color:var(--loss);}
.cs-chevron{font-size:11px;color:var(--text3);margin-top:4px;}

/* mini stat row inside card */
.card-stats{display:flex;border-top:1px solid var(--border);}
.cstat{flex:1;padding:10px 12px;text-align:center;}
.cstat:not(:last-child){border-right:1px solid var(--border);}
.cstat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.cstat-val{font-family:var(--mono);font-size:12px;color:var(--text2);}
.cstat-val.pos{color:var(--accent);}
.cstat-val.neg{color:var(--loss);}

/* expanded detail */
.card-detail{border-top:1px solid var(--border);}
.detail-inner{padding:12px 14px;}
.detail-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:10px 0 6px;}
.detail-title:first-child{margin-top:0;}

/* price input row inside card */
.price-row{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
.price-small-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;-webkit-appearance:none;}
.price-small-input:focus{border-color:var(--accent);}
.btn-set-price{padding:8px 14px;background:var(--accent);border:none;border-radius:8px;color:#000;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;}

/* lot rows */
.lot-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.lot-row:last-child{border-bottom:none;}
.lr-date{font-family:var(--mono);font-size:11px;color:var(--text2);}
.lr-detail{font-size:10px;color:var(--text3);margin-top:2px;}
.lr-right{display:flex;align-items:center;gap:6px;}
.lr-profit{font-family:var(--mono);font-size:12px;}
.lr-profit.pos{color:var(--accent);}
.lr-profit.neg{color:var(--loss);}
.lr-rate{font-size:10px;color:var(--text3);text-align:right;}

/* sell button on lot row */
.btn-sell-lot{padding:4px 10px;background:var(--warn-dim);border:1px solid var(--warn);border-radius:6px;color:var(--warn);font-size:10px;cursor:pointer;white-space:nowrap;}

/* chart inside card */
.card-chart-wrap{height:180px;margin:8px 0 4px;position:relative;}
.card-chart-wrap canvas{width:100%;height:100%;display:block;}
.chart-empty-msg{height:100px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;}
.cl-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);}
.cl-line{width:18px;height:2px;}

/* realized tab */
.realized-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin:0 14px;padding:14px;}
.rc-header{display:flex;justify-content:space-between;margin-bottom:10px;}
.rc-code{font-family:var(--mono);font-size:14px;font-weight:500;}
.rc-name{font-size:11px;color:var(--text2);margin-top:2px;}
.rc-total{font-family:var(--mono);font-size:15px;font-weight:500;}
.rc-total.pos{color:var(--accent);}
.rc-total.neg{color:var(--loss);}
.rc-rate{font-size:11px;}
.rc-rate.pos{color:var(--accent);}
.rc-rate.neg{color:var(--loss);}

/* tools */
.tools-row{display:flex;gap:8px;padding:0 14px;margin:14px 0 0;}
.tool-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 4px;color:var(--text2);font-size:11px;cursor:pointer;text-align:center;}

/* FAB */
.fab{position:fixed;bottom:28px;right:18px;background:var(--accent);color:#000;border:none;border-radius:28px;padding:14px 20px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 24px rgba(0,229,160,.25);z-index:100;}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:24px 18px 44px;width:100%;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:500;margin-bottom:18px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--sans);font-size:15px;outline:none;-webkit-appearance:none;}
.form-input:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-hint{font-size:10px;color:var(--text3);margin-top:4px;}
.form-readonly{background:var(--bg);color:var(--text2);}
.btn-row{display:flex;gap:10px;margin-top:18px;}
.btn-cancel{flex:1;padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:15px;cursor:pointer;}
.btn-save{flex:2;padding:13px;background:var(--accent);border:none;border-radius:12px;color:#000;font-size:15px;font-weight:500;cursor:pointer;}
.btn-danger{flex:2;padding:13px;background:var(--loss-dim);border:1px solid var(--loss);border-radius:12px;color:var(--loss);font-size:15px;cursor:pointer;}

.empty-state{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px;}
.empty-state div:first-child{font-size:32px;margin-bottom:12px;}
.del-btn{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:2px 6px;border-radius:6px;}
.del-btn:active{background:var(--loss-dim);color:var(--loss);}
.no-select{user-select:none;-webkit-user-select:none;}
.page{display:none;}.page.active{display:block;}

/* chart tab */
.chart-tab-wrap{padding:14px;}
.chart-stock-sel{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;-webkit-appearance:none;margin-bottom:12px;}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
.chart-box-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.price-log-list .pl-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.price-log-list .pl-row:last-child{border-bottom:none;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title" id="app-title">股票收益记录</div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ja')">日本語</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('positions')" id="tab-positions">持仓</div>
  <div class="tab" onclick="showTab('realized')" id="tab-realized">已实现</div>
  <div class="tab" onclick="showTab('chart')" id="tab-chart">图表</div>
</div>

<!-- ══ 持仓 ══ -->
<div class="page active" id="page-positions">
  <div class="top-sum">
    <div class="top-sum-row">
      <div class="top-sum-item">
        <div class="tsi-label" id="lbl-unrealized">持仓预想收益</div>
        <div class="tsi-val zero" id="sum-unrealized">— —</div>
        <div class="tsi-sub" id="sum-unrealized-rate"></div>
      </div>
      <div class="top-sum-item">
        <div class="tsi-label" id="lbl-market-val">当前总市值</div>
        <div class="tsi-val zero" id="sum-market-val">— —</div>
        <div class="tsi-sub" id="sum-invested-sub"></div>
      </div>
    </div>
  </div>
  <div class="section-title" id="lbl-holdings">持有股票</div>
  <div class="stock-list" id="holdings-list"></div>
</div>

<!-- ══ 已实现 ══ -->
<div class="page" id="page-realized">
  <div class="top-sum">
    <div class="top-sum-row">
      <div class="top-sum-item" style="border-right:none;padding:0;">
        <div class="tsi-label" id="lbl-realized-total">已实现累计收益</div>
        <div class="tsi-val zero" id="sum-realized">¥ 0.00</div>
        <div class="tsi-sub" id="sum-realized-rate"></div>
      </div>
    </div>
  </div>
  <div class="section-title" id="lbl-realized-stocks">已平仓股票</div>
  <div class="stock-list" id="realized-list"></div>
</div>

<!-- ══ 图表 ══ -->
<div class="page" id="page-chart">
  <div class="chart-tab-wrap">
    <select class="chart-stock-sel" id="chart-stock-select" onchange="renderChartTab()"></select>
    <div class="chart-box">
      <div class="chart-box-title" id="lbl-chart-title">股价走势</div>
      <div style="height:200px;position:relative;">
        <canvas id="main-chart" style="width:100%;height:100%;display:block;"></canvas>
        <div id="chart-empty-main" style="display:none;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;"></div>
      </div>
      <div class="chart-legend" style="margin-top:8px;">
        <div class="cl-item"><div class="cl-line" style="background:var(--accent)"></div><span id="legend-price">记录价格</span></div>
        <div class="cl-item"><div class="cl-line" style="background:var(--warn);border-top:2px dashed var(--warn);height:0;margin-top:1px;"></div><span id="legend-buy">买入均价</span></div>
        <div class="cl-item"><div class="cl-line" style="background:var(--loss)"></div><span id="legend-sell">实际卖出</span></div>
      </div>
    </div>
    <div class="chart-box" style="margin-top:10px;">
      <div class="chart-box-title" id="lbl-price-history">价格记录历史</div>
      <div class="price-log-list" id="price-history-list"></div>
    </div>
  </div>
</div>

<div class="tools-row">
  <button class="tool-btn" onclick="exportData()" id="btn-export">📤 导出</button>
  <button class="tool-btn" onclick="document.getElementById('import-file').click()" id="btn-import">📥 导入</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  <button class="tool-btn" onclick="clearAll()" id="btn-clear">🗑 清空</button>
</div>

<button class="fab" onclick="openBuyModal()" id="fab-btn">＋ 买入</button>

<!-- ══ 买入 Modal ══ -->
<div class="modal-overlay" id="buy-modal" onclick="if(event.target===this)closeBuyModal()">
  <div class="modal no-select">
    <div class="modal-title" id="modal-buy-title">登记买入</div>
    <div class="form-group">
      <label class="form-label" id="lbl-code-name">股票代码 / 名称</label>
      <div class="form-row">
        <div>
          <input class="form-input" id="f-code" inputmode="text" autocomplete="off">
          <div class="form-hint" id="hint-code">如: 600519.SS / AAPL / 7203.T</div>
        </div>
        <input class="form-input" id="f-name" autocomplete="off">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-date">买入日期</label>
      <input class="form-input" id="f-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-buy-info">买入信息</label>
      <div class="form-row">
        <div>
          <input class="form-input" id="f-buy-price" inputmode="decimal">
          <div class="form-hint" id="hint-buy-price">元 / 股</div>
        </div>
        <div>
          <input class="form-input" id="f-shares" inputmode="decimal">
          <div class="form-hint" id="hint-shares">股</div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-fee">手续费（可选）</label>
      <input class="form-input" id="f-fee" inputmode="decimal">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-note">备注</label>
      <input class="form-input" id="f-note">
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeBuyModal()" id="btn-cancel">取消</button>
      <button class="btn-save" onclick="saveBuy()" id="btn-save">保存</button>
    </div>
  </div>
</div>

<!-- ══ 卖出 Modal ══ -->
<div class="modal-overlay" id="sell-modal" onclick="if(event.target===this)closeSellModal()">
  <div class="modal no-select">
    <div class="modal-title" id="modal-sell-title">登记卖出</div>
    <!-- readonly info -->
    <div class="form-group">
      <label class="form-label" id="lbl-sell-stock">股票</label>
      <div class="form-row">
        <input class="form-input form-readonly" id="s-code" readonly>
        <input class="form-input form-readonly" id="s-name" readonly>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-sell-buy-info">买入记录</label>
      <div class="form-row">
        <div>
          <input class="form-input form-readonly" id="s-buy-price" readonly>
          <div class="form-hint" id="hint-s-buy-price">买入价</div>
        </div>
        <div>
          <input class="form-input form-readonly" id="s-shares" readonly>
          <div class="form-hint" id="hint-s-shares">股数</div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-sell-date">卖出日期</label>
      <input class="form-input" id="s-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-sell-price">卖出价格（元 / 股）</label>
      <input class="form-input" id="s-sell-price" inputmode="decimal">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-sell-fee">手续费（可选）</label>
      <input class="form-input" id="s-fee" inputmode="decimal">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-sell-note">备注</label>
      <input class="form-input" id="s-note">
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSellModal()" id="btn-sell-cancel">取消</button>
      <button class="btn-save" onclick="saveSell()" id="btn-sell-save">确认卖出</button>
    </div>
  </div>
</div>

<!-- ══ 批次详情 Modal ══ -->
<div class="modal-overlay" id="lot-modal" onclick="if(event.target===this)closeLotModal()">
  <div class="modal no-select">
    <div class="modal-title" id="lot-modal-title">批次详情</div>
    <div id="lot-modal-body"></div>
    <div class="btn-row" style="margin-top:14px;">
      <button class="btn-cancel" onclick="closeLotModal()">关闭</button>
      <button class="btn-danger" id="lot-delete-btn">删除记录</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  i18n
// ══════════════════════════════════════════════

let lang = localStorage.getItem('stock_lang')||'zh';
let trades = JSON.parse(localStorage.getItem('stock_trades')||'[]');
let priceLog = JSON.parse(localStorage.getItem('stock_price_log')||'{}');
let currentPrices = JSON.parse(localStorage.getItem('stock_current_prices')||'{}');
let currentTab = 'positions';
const expandedCards = new Set();

function t(k){ return I18N[lang][k]||k; }
function saveAll(){
  localStorage.setItem('stock_trades',JSON.stringify(trades));
  localStorage.setItem('stock_price_log',JSON.stringify(priceLog));
  localStorage.setItem('stock_current_prices',JSON.stringify(currentPrices));
}

// ── Format ──
function cur(){ return t('currency'); }
function fmt(n){
  const abs=Math.abs(n).toLocaleString(t('locale'),{minimumFractionDigits:2,maximumFractionDigits:2});
  return (n>=0?'+':'-')+cur()+' '+abs;
}
function fmtP(n){
  return cur()+' '+Math.abs(n).toLocaleString(t('locale'),{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtRate(r){ return (r>=0?'+':'')+r.toFixed(2)+'%'; }
function cls(n){ return n>0?'pos':n<0?'neg':'zero'; }

// ── Groups ──
function getGroups(){
  const g={};
  trades.forEach((tr,i)=>{
    const key=(tr.code||tr.name||'').toUpperCase().trim();
    if(!key) return;
    if(!g[key]) g[key]={code:tr.code,name:tr.name,key,holdings:[],closed:[]};
    const obj={...tr,_idx:i};
    if(tr.sellPrice!=null && tr.sellPrice!=='' && Number(tr.sellPrice)>0){
      obj.sellPrice=Number(tr.sellPrice); g[key].closed.push(obj);
    } else {
      obj.sellPrice=null; g[key].holdings.push(obj);
    }
  });
  return g;
}

// ── Tab ──
function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(tb=>tb.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='chart') renderChartTab();
}

// ══════════════════════════════════════════════
//  Render All
// ══════════════════════════════════════════════
function renderAll(){
  renderPositions();
  renderRealized();
  updateChartSelect();
  if(currentTab==='chart') renderChartTab();
}

// ══════════════════════════════════════════════
//  Positions Tab
// ══════════════════════════════════════════════
function renderPositions(){
  const groups=getGroups();
  const holdGroups=Object.values(groups).filter(g=>g.holdings.length>0);

  // top summary
  let totalUnrealized=0,totalInvested=0,totalMV=0,hasPrice=false;
  holdGroups.forEach(g=>{
    const cp=currentPrices[g.key];
    g.holdings.forEach(tr=>{
      const cost=tr.buyPrice*tr.shares+(tr.fee||0);
      totalInvested+=cost;
      if(cp){ totalMV+=cp.price*tr.shares; totalUnrealized+=cp.price*tr.shares-cost; hasPrice=true; }
    });
  });

  const unrEl=document.getElementById('sum-unrealized');
  const unrRateEl=document.getElementById('sum-unrealized-rate');
  const mvEl=document.getElementById('sum-market-val');
  if(hasPrice){
    unrEl.textContent=fmt(totalUnrealized);
    unrEl.className='tsi-val '+cls(totalUnrealized);
    const rate=totalInvested>0?(totalUnrealized/totalInvested*100):0;
    unrRateEl.textContent=fmtRate(rate);
    unrRateEl.className='tsi-sub '+cls(rate);
    mvEl.textContent=fmtP(totalMV);
    mvEl.className='tsi-val';
  } else {
    unrEl.textContent=t('dash'); unrEl.className='tsi-val zero';
    unrRateEl.textContent=''; mvEl.textContent=t('dash'); mvEl.className='tsi-val zero';
  }
  document.getElementById('sum-invested-sub').textContent=t('invested')+': '+fmtP(totalInvested);

  const list=document.getElementById('holdings-list');
  if(holdGroups.length===0){
    list.innerHTML=`<div class="empty-state"><div>📈</div>${t('emptyHoldings')}</div>`;
    return;
  }
  list.innerHTML='';
  holdGroups.forEach(g=>{ list.appendChild(buildHoldingCard(g)); });
}

function buildHoldingCard(g){
  const cp=currentPrices[g.key];
  const isOpen=expandedCards.has(g.key);

  // per-card stats
  let gInvested=0,gMV=0,gUnrealized=0,totalShares=0,weightedBuy=0;
  g.holdings.forEach(tr=>{
    const cost=tr.buyPrice*tr.shares+(tr.fee||0);
    gInvested+=cost; totalShares+=tr.shares; weightedBuy+=tr.buyPrice*tr.shares;
    if(cp){ gMV+=cp.price*tr.shares; gUnrealized+=cp.price*tr.shares-cost; }
  });
  const avgBuy=totalShares>0?weightedBuy/totalShares:0;
  const gRate=gInvested>0?(gUnrealized/gInvested*100):0;

  // also show realized total for this stock in header
  let gRealized=0;
  g.closed.forEach(tr=>{ gRealized+=(tr.sellPrice-tr.buyPrice)*tr.shares-(tr.fee||0); });

  const card=document.createElement('div');
  card.className='stock-card';

  // ── header ──
  const mvText = cp ? fmtP(gMV) : t('dash');
  const unrText = cp ? fmt(gUnrealized) : t('dash');
  const unrCls = cp ? cls(gUnrealized) : 'zero';
  const rateTxt = cp ? fmtRate(gRate) : t('dash');
  const rateCls = cp ? cls(gRate) : 'zero';

  let html=`
  <div class="card-summary" onclick="toggleCard('${g.key}')">
    <div class="cs-left">
      <div class="cs-code">${g.code||'—'}</div>
      <div class="cs-name">${g.name||'—'}</div>
    </div>
    <div class="cs-right">
      <div class="cs-total ${unrCls}">${unrText}</div>
      <div class="cs-rate ${rateCls}">${rateTxt}</div>
      <div class="cs-chevron">${isOpen?'▲':'▼'}</div>
    </div>
  </div>
  <div class="card-stats">
    <div class="cstat">
      <div class="cstat-label">${t('marketValLbl')}</div>
      <div class="cstat-val ${cp?'':''}">${mvText}</div>
    </div>
    <div class="cstat">
      <div class="cstat-label">${t('investedLbl')}</div>
      <div class="cstat-val">${fmtP(gInvested)}</div>
    </div>
    <div class="cstat">
      <div class="cstat-label">${t('shares')}</div>
      <div class="cstat-val">${totalShares}</div>
    </div>
  </div>`;

  // ── price input ──
  const inputId='pi-'+g.key;
  html+=`
  <div class="price-row">
    <input class="price-small-input" id="${inputId}" inputmode="decimal" placeholder="${t('currentPriceLbl')}">
    <button class="btn-set-price" onclick="manualSetPrice('${g.key}','${inputId}')">${t('currentPriceBtn')}</button>
  </div>`;

  // ── expanded detail ──
  if(isOpen){
    html+=`<div class="card-detail"><div class="detail-inner">`;

    // mini chart inside card
    const log=(priceLog[g.key]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
    if(log.length>0){
      const cid='cc-'+g.key;
      html+=`<div class="detail-title">${t('chartTitle')}</div>
      <div class="card-chart-wrap"><canvas id="${cid}"></canvas></div>`;
    }

    // holding lots
    html+=`<div class="detail-title">${t('holdingLots')}</div>`;
    g.holdings.forEach(tr=>{
      const cost=tr.buyPrice*tr.shares+(tr.fee||0);
      const p=cp?(cp.price-tr.buyPrice)*tr.shares-(tr.fee||0):null;
      const r=p!=null&&cost>0?(p/cost*100):null;
      html+=`<div class="lot-row">
        <div>
          <div class="lr-date">${tr.date}</div>
          <div class="lr-detail">${t('buyWord')} ${cur()}${tr.buyPrice} × ${tr.shares}${t('shares')}${tr.fee?` ｜${t('feeWord')} ${cur()}${tr.fee}`:''}${tr.note?` ｜${tr.note}`:''}</div>
          ${p!=null?`<div class="lr-detail" style="margin-top:2px">${t('unrealizedLbl')}: <span style="font-family:var(--mono);color:${p>=0?'var(--accent)':'var(--loss)'}">${fmt(p)}</span>${r!=null?' ('+fmtRate(r)+')':''}</span></div>`:''}
        </div>
        <div class="lr-right">
          <button class="btn-sell-lot" onclick="openSellModal(${tr._idx},event)">${t('sellBtn')}</button>
          <button class="del-btn" onclick="openLotDetail(${tr._idx},event)">⋯</button>
        </div>
      </div>`;
    });

    html+=`</div></div>`;
  }

  card.innerHTML=html;

  // draw mini chart after DOM insert
  if(isOpen){
    setTimeout(()=>{
      const log=(priceLog[g.key]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
      if(log.length>0){
        const canvas=card.querySelector('#cc-'+g.key);
        if(canvas) drawMiniChart(canvas,log,avgBuy,g.closed);
      }
    },0);
  }

  return card;
}

function manualSetPrice(key,inputId){
  const val=parseFloat(document.getElementById(inputId).value);
  if(isNaN(val)||val<=0){ alert('请输入有效价格'); return; }
  currentPrices[key]={price:val,source:'manual',updatedAt:new Date().toISOString()};
  const today=new Date().toISOString().slice(0,10);
  if(!priceLog[key]) priceLog[key]=[];
  const idx=priceLog[key].findIndex(p=>p.date===today);
  if(idx>=0) priceLog[key][idx]={date:today,price:val,source:'manual'};
  else priceLog[key].push({date:today,price:val,source:'manual'});
  priceLog[key].sort((a,b)=>a.date.localeCompare(b.date));
  saveAll(); renderAll();
}

function toggleCard(key){
  if(expandedCards.has(key)) expandedCards.delete(key);
  else expandedCards.add(key);
  renderAll();
}

// ══════════════════════════════════════════════
//  Realized Tab
// ══════════════════════════════════════════════
function renderRealized(){
  const groups=getGroups();
  const closedGroups=Object.values(groups).filter(g=>g.closed.length>0);
  let totalRealized=0,totalCost=0;
  closedGroups.forEach(g=>{
    g.closed.forEach(tr=>{
      totalCost+=tr.buyPrice*tr.shares+(tr.fee||0);
      totalRealized+=(tr.sellPrice-tr.buyPrice)*tr.shares-(tr.fee||0);
    });
  });
  const relEl=document.getElementById('sum-realized');
  relEl.textContent=fmt(totalRealized);
  relEl.className='tsi-val '+cls(totalRealized);
  const rate=totalCost>0?(totalRealized/totalCost*100):0;
  const rateEl=document.getElementById('sum-realized-rate');
  rateEl.textContent=fmtRate(rate);
  rateEl.className='tsi-sub '+cls(rate);

  const list=document.getElementById('realized-list');
  if(closedGroups.length===0){
    list.innerHTML=`<div class="empty-state"><div>💰</div>${t('emptyRealized')}</div>`;
    return;
  }
  list.innerHTML='';
  closedGroups.forEach(g=>{
    let gR=0,gC=0;
    g.closed.forEach(tr=>{ gC+=tr.buyPrice*tr.shares+(tr.fee||0); gR+=(tr.sellPrice-tr.buyPrice)*tr.shares-(tr.fee||0); });
    const gRate=gC>0?(gR/gC*100):0;
    const isOpen=expandedCards.has('r-'+g.key);
    const card=document.createElement('div');
    card.className='realized-card';
    let html=`
    <div class="rc-header" onclick="toggleCard('r-${g.key}')" style="cursor:pointer;">
      <div><div class="rc-code">${g.code||'—'}</div><div class="rc-name">${g.name||'—'}</div></div>
      <div style="text-align:right">
        <div class="rc-total ${cls(gR)}">${fmt(gR)}</div>
        <div class="rc-rate ${cls(gRate)}">${fmtRate(gRate)}</div>
      </div>
    </div>`;
    if(isOpen){
      const sorted=[...g.closed].sort((a,b)=>new Date(b.date)-new Date(a.date));
      sorted.forEach(tr=>{
        const cost=tr.buyPrice*tr.shares+(tr.fee||0);
        const p=(tr.sellPrice-tr.buyPrice)*tr.shares-(tr.fee||0);
        const r=cost>0?(p/cost*100):0;
        html+=`<div class="lot-row">
          <div>
            <div class="lr-date">${tr.date}</div>
            <div class="lr-detail">${t('buyWord')} ${cur()}${tr.buyPrice} → ${t('sellWord')} ${cur()}${tr.sellPrice} × ${tr.shares}${t('shares')}${tr.fee?` ｜${cur()}${tr.fee}`:''}${tr.note?` ｜${tr.note}`:''}</div>
          </div>
          <div class="lr-right">
            <div>
              <div class="lr-profit ${cls(p)}">${fmt(p)}</div>
              <div class="lr-rate">${fmtRate(r)}</div>
            </div>
            <button class="del-btn" onclick="openLotDetail(${tr._idx},event)">⋯</button>
          </div>
        </div>`;
      });
    }
    card.innerHTML=html;
    list.appendChild(card);
    // add gap
    const spacer=document.createElement('div');
    spacer.style.height='10px';
    list.appendChild(spacer);
  });
}

// ══════════════════════════════════════════════
//  Chart Tab
// ══════════════════════════════════════════════
function updateChartSelect(){
  const sel=document.getElementById('chart-stock-select');
  const groups=getGroups();
  const keys=Object.keys(groups);
  const prev=sel.value;
  sel.innerHTML=keys.length===0?`<option value="">${t('emptyHoldings')}</option>`
    :keys.map(k=>`<option value="${k}">${groups[k].code||''} ${groups[k].name||''}</option>`).join('');
  if(keys.includes(prev)) sel.value=prev;
}

function renderChartTab(){
  const sel=document.getElementById('chart-stock-select');
  const key=sel.value; if(!key) return;
  const groups=getGroups();
  const g=groups[key]; if(!g) return;
  const log=(priceLog[key]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const canvas=document.getElementById('main-chart');
  const emptyEl=document.getElementById('chart-empty-main');
  if(log.length===0){
    canvas.style.visibility='hidden';
    emptyEl.style.display='flex'; emptyEl.textContent=t('noPrice');
  } else {
    canvas.style.visibility='visible';
    emptyEl.style.display='none';
    let wBuy=0,tSh=0;
    [...g.holdings,...g.closed].forEach(tr=>{ wBuy+=tr.buyPrice*tr.shares; tSh+=tr.shares; });
    const avgBuy=tSh>0?wBuy/tSh:null;
    drawMiniChart(canvas,log,avgBuy,g.closed,true);
  }
  // price log list
  const listEl=document.getElementById('price-history-list');
  if(log.length===0){ listEl.innerHTML=`<div style="color:var(--text3);font-size:12px;">${t('noPrice')}</div>`; return; }
  listEl.innerHTML='';
  listEl.className='price-log-list';
  [...log].reverse().forEach(p=>{
    const row=document.createElement('div');
    row.className='pl-row';
    row.innerHTML=`
      <div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text2)">${p.date}</div>
        <div style="font-size:10px;color:var(--text3)">${p.source==='auto'?'auto':'manual'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-family:var(--mono);font-size:13px;">${cur()}${p.price.toFixed(2)}</span>
        <button class="del-btn" onclick="deletePriceLog('${key}','${p.date}')">×</button>
      </div>`;
    listEl.appendChild(row);
  });
}

function deletePriceLog(key,date){
  if(!confirm(t('deletePriceLog'))) return;
  priceLog[key]=(priceLog[key]||[]).filter(p=>p.date!==date);
  saveAll(); renderChartTab();
}

// ══════════════════════════════════════════════
//  Canvas Chart
// ══════════════════════════════════════════════
function drawMiniChart(canvas,log,avgBuy,closedTrades,large){
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth, H=canvas.offsetHeight||200;
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const pad={top:16,right:14,bottom:36,left:56};
  const cw=W-pad.left-pad.right, ch=H-pad.top-pad.bottom;

  const prices=log.map(p=>p.price);
  const labels=log.map(p=>p.date);
  const sellMap={};
  (closedTrades||[]).forEach(tr=>{ if(!sellMap[tr.date]) sellMap[tr.date]=[]; sellMap[tr.date].push(tr.sellPrice); });

  const allV=[...prices, avgBuy].filter(Boolean);
  Object.values(sellMap).flat().forEach(v=>allV.push(v));
  const minV=Math.min(...allV)*0.985, maxV=Math.max(...allV)*1.015;
  const range=maxV-minV||1;

  const xOf=i=>pad.left+(i/(labels.length-1||1))*cw;
  const yOf=v=>pad.top+(1-(v-minV)/range)*ch;

  ctx.clearRect(0,0,W,H);

  // grid
  for(let i=0;i<=4;i++){
    const y=pad.top+i/4*ch;
    ctx.strokeStyle='rgba(31,45,69,0.9)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke();
    ctx.fillStyle='#3d5070'; ctx.font='9px DM Mono,monospace'; ctx.textAlign='right';
    ctx.fillText((maxV-i/4*range).toFixed(2),pad.left-5,y+3.5);
  }

  // avg buy line
  if(avgBuy){
    const yA=yOf(avgBuy);
    ctx.strokeStyle='#f5c842'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(pad.left,yA); ctx.lineTo(pad.left+cw,yA); ctx.stroke();
    ctx.setLineDash([]);
  }

  // sell dots
  labels.forEach((l,i)=>{
    if(sellMap[l]){
      sellMap[l].forEach(sv=>{
        ctx.fillStyle='#ff5c7a';
        ctx.beginPath(); ctx.arc(xOf(i),yOf(sv),5,0,Math.PI*2); ctx.fill();
      });
    }
  });

  // price line
  ctx.strokeStyle='#00e5a0'; ctx.lineWidth=2; ctx.setLineDash([]);
  ctx.beginPath();
  prices.forEach((v,i)=>{ i===0?ctx.moveTo(xOf(i),yOf(v)):ctx.lineTo(xOf(i),yOf(v)); });
  ctx.stroke();

  // price dots
  prices.forEach((v,i)=>{
    ctx.fillStyle='#00e5a0';
    ctx.beginPath(); ctx.arc(xOf(i),yOf(v),3,0,Math.PI*2); ctx.fill();
  });

  // x labels
  ctx.fillStyle='#3d5070'; ctx.textAlign='center'; ctx.font='9px DM Mono,monospace';
  const step=Math.max(1,Math.floor(labels.length/5));
  labels.forEach((l,i)=>{ if(i%step===0||i===labels.length-1) ctx.fillText(l.slice(5),xOf(i),H-pad.bottom+13); });
}

// ══════════════════════════════════════════════
//  Buy Modal
// ══════════════════════════════════════════════
function openBuyModal(){
  document.getElementById('buy-modal').classList.add('open');
  document.getElementById('f-date').valueAsDate=new Date();
}
function closeBuyModal(){
  document.getElementById('buy-modal').classList.remove('open');
  ['f-code','f-name','f-buy-price','f-shares','f-fee','f-note'].forEach(id=>{ document.getElementById(id).value=''; });
}
function saveBuy(){
  const code=document.getElementById('f-code').value.trim().toUpperCase();
  const name=document.getElementById('f-name').value.trim();
  const date=document.getElementById('f-date').value;
  const buyPrice=parseFloat(document.getElementById('f-buy-price').value);
  const shares=parseFloat(document.getElementById('f-shares').value);
  const fee=parseFloat(document.getElementById('f-fee').value)||0;
  const note=document.getElementById('f-note').value.trim();
  if((!code&&!name)||!date||isNaN(buyPrice)||isNaN(shares)){ alert(t('alertRequired')); return; }
  trades.push({code,name,date,buyPrice,shares,sellPrice:null,fee,note});
  saveAll(); renderAll(); closeBuyModal();
}

// ══════════════════════════════════════════════
//  Sell Modal
// ══════════════════════════════════════════════
let sellTargetIdx=null;
function openSellModal(tradeIdx, e){
  e && e.stopPropagation();
  const tr=trades[tradeIdx]; if(!tr) return;
  sellTargetIdx=tradeIdx;
  document.getElementById('s-code').value=tr.code||'';
  document.getElementById('s-name').value=tr.name||'';
  document.getElementById('s-buy-price').value=tr.buyPrice;
  document.getElementById('s-shares').value=tr.shares;
  document.getElementById('s-date').valueAsDate=new Date();
  document.getElementById('s-sell-price').value='';
  document.getElementById('s-fee').value='';
  document.getElementById('s-note').value='';
  document.getElementById('sell-modal').classList.add('open');
}
function closeSellModal(){
  document.getElementById('sell-modal').classList.remove('open');
  sellTargetIdx=null;
}
function saveSell(){
  if(sellTargetIdx===null) return;
  const date=document.getElementById('s-date').value;
  const sellPrice=parseFloat(document.getElementById('s-sell-price').value);
  const fee=parseFloat(document.getElementById('s-fee').value)||0;
  const note=document.getElementById('s-note').value.trim();
  if(!date||isNaN(sellPrice)||sellPrice<=0){ alert(t('alertSellRequired')); return; }
  trades[sellTargetIdx]={...trades[sellTargetIdx], sellPrice, date, fee:((trades[sellTargetIdx].fee||0)+fee)||0, note:note||trades[sellTargetIdx].note};
  // update date to sell date
  trades[sellTargetIdx].sellDate=date;
  saveAll(); renderAll(); closeSellModal();
}

// ══════════════════════════════════════════════
//  Lot Detail / Delete Modal
// ══════════════════════════════════════════════
let lotDetailIdx=null;
function openLotDetail(tradeIdx, e){
  e && e.stopPropagation();
  const tr=trades[tradeIdx]; if(!tr) return;
  lotDetailIdx=tradeIdx;
  const profit=tr.sellPrice?((tr.sellPrice-tr.buyPrice)*tr.shares-(tr.fee||0)):null;
  const cost=tr.buyPrice*tr.shares+(tr.fee||0);
  const rate=profit!=null&&cost>0?(profit/cost*100):null;
  document.getElementById('lot-modal-body').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;justify-content:space-between;"><span style="color:var(--text3);font-size:12px">${t('codeName')}</span><span style="font-family:var(--mono)">${tr.code||''} ${tr.name||''}</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="color:var(--text3);font-size:12px">${t('date')}</span><span style="font-family:var(--mono)">${tr.date}</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="color:var(--text3);font-size:12px">${t('buyInfo')}</span><span style="font-family:var(--mono)">${cur()}${tr.buyPrice} × ${tr.shares}${t('shares')}</span></div>
      ${tr.sellPrice?`<div style="display:flex;justify-content:space-between;"><span style="color:var(--text3);font-size:12px">${t('sellPrice')}</span><span style="font-family:var(--mono)">${cur()}${tr.sellPrice}</span></div>`:''}
      ${tr.fee?`<div style="display:flex;justify-content:space-between;"><span style="color:var(--text3);font-size:12px">${t('fee')}</span><span style="font-family:var(--mono)">${cur()}${tr.fee}</span></div>`:''}
      ${tr.note?`<div style="display:flex;justify-content:space-between;"><span style="color:var(--text3);font-size:12px">${t('note')}</span><span>${tr.note}</span></div>`:''}
      ${profit!=null?`<div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center;margin-top:4px;">
        <div style="font-size:10px;color:var(--text3);margin-bottom:6px">${t('realizedTotal')}</div>
        <div style="font-family:var(--mono);font-size:20px;font-weight:500;color:${profit>=0?'var(--accent)':'var(--loss)'}">${fmt(profit)}</div>
        <div style="font-family:var(--mono);font-size:12px;color:${profit>=0?'var(--accent)':'var(--loss)'};margin-top:4px">${rate!=null?fmtRate(rate):''}</div>
      </div>`:''}
    </div>`;
  document.getElementById('lot-delete-btn').onclick=()=>deleteLot(tradeIdx);
  document.getElementById('lot-modal').classList.add('open');
}
function closeLotModal(){
  document.getElementById('lot-modal').classList.remove('open');
  lotDetailIdx=null;
}
function deleteLot(idx){
  if(!confirm(t('confirmDelete'))) return;
  trades.splice(idx,1);
  saveAll(); renderAll(); closeLotModal();
}

// ══════════════════════════════════════════════
//  Import / Export
// ══════════════════════════════════════════════
function exportData(){
  const blob=new Blob([JSON.stringify({trades,priceLog,currentPrices},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='stock_data_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(Array.isArray(data)){
        if(confirm(`${data.length} ${t('confirmImport')}`)){trades=[...trades,...data];saveAll();renderAll();}
      } else if(data.trades){
        if(confirm(`${data.trades.length} ${t('confirmImport')}`)){
          trades=[...trades,...(data.trades||[])];
          Object.entries(data.priceLog||{}).forEach(([k,v])=>{
            priceLog[k]=[...(priceLog[k]||[]),...v];
            priceLog[k].sort((a,b)=>a.date.localeCompare(b.date));
          });
          Object.assign(currentPrices,data.currentPrices||{});
          saveAll(); renderAll();
        }
      } else throw new Error();
    } catch{ alert(t('jsonError')); }
  };
  reader.readAsText(file); e.target.value='';
}
function clearAll(){
  if(confirm(t('confirmClear'))){ trades=[];priceLog={};currentPrices={};saveAll();renderAll(); }
}

function setLang(l){
  lang=l; localStorage.setItem('stock_lang',l);
  document.documentElement.style.setProperty('--sans',l==='ja'?"'Noto Sans JP',sans-serif":"'Noto Sans SC',sans-serif");
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent.trim()===(l==='zh'?'中文':l==='en'?'EN':'日本語'));
  });
  applyI18n(); renderAll();
}

setLang(lang);
renderAll();
</script>
